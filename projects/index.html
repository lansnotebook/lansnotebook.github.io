<script>
(function() {
  const INTERVAL_MS = 5000;
  const VISIBLE_BUTTONS = 5;

  function getLang() {
    if (window.__getLang) return window.__getLang();
    var lang = document.documentElement.getAttribute('lang');
    return (lang === 'zh-CN' ? 'zh-CN' : 'en');
  }

  function getStrings() {
    return (window.__i18n && window.__i18n[getLang()]) || (window.__i18n && window.__i18n.en) || {};
  }

  function getData() {
    var enEl = document.getElementById('projectsPageDataEn');
    var cnEl = document.getElementById('projectsPageDataCn');
    try {
      var en = enEl && enEl.textContent ? JSON.parse(enEl.textContent) : [];
      var cn = cnEl && cnEl.textContent ? JSON.parse(cnEl.textContent) : [];
      return getLang() === 'zh-CN' ? cn : en;
    } catch (e) { return []; }
  }

  function buildCards(project) {
    if (!project) return { imageCards: [], descCards: [] };
    var strings = getStrings();
    var openProject = (strings['buttons.click_to_open'] != null ? strings['buttons.click_to_open'] : 'Click to Open');
    var wantMore = (strings['projects_page.want_more'] != null ? strings['projects_page.want_more'] : 'Want to know more about this project?');
    var openPost = (strings['buttons.view_more'] != null ? strings['buttons.view_more'] : 'View more');

    var imageCards = [];
    var descCards = [];

    // Card 0: thumbnail + description + open project button
    var thumbHtml = project.thumbnail
      ? '<img src="' + project.thumbnail.replace(/"/g, '&quot;') + '" alt="">'
      : '<div class="projects-image-placeholder"><i class="fa-solid fa-image"></i></div>';
    imageCards.push(thumbHtml);
    descCards.push(
      '<h3 class="projects-desc-title">' + (project.title || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</h3>' +
      '<p class="projects-desc-text">' + (project.description || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</p>' +
      '<a href="' + (project.projectUrl || '#').replace(/"/g, '&quot;') + '" target="_blank" rel="noopener" class="project-card-link">' +
      '<i class="fa-solid fa-external-link-alt"></i> ' + openProject + '</a>'
    );

    // Cards 1-4: imageN + descriptionN (no button)
    for (var n = 1; n <= 4; n++) {
      var img = project['image' + n];
      var desc = project['description' + n] || '';
      var imgHtml = img
        ? '<img src="' + img.replace(/"/g, '&quot;') + '" alt="">'
        : '<div class="projects-image-placeholder"><i class="fa-solid fa-image"></i></div>';
      imageCards.push(imgHtml);
      descCards.push(
        '<p class="projects-desc-text">' + desc.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</p>' +
        '<a href="' + (project.projectUrl || '#').replace(/"/g, '&quot;') + '" target="_blank" rel="noopener" class="project-card-link">' +
      '<i class="fa-solid fa-external-link-alt"></i> ' + openProject + '</a>'
      );
    }

    // Card 5: "Want to know more?" + open post button
    imageCards.push(
      '<div class="projects-want-more-block">' +
      '<p class="projects-want-more-text">' + wantMore.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</p>' +
      '<a href="' + (project.postUrl || '#').replace(/"/g, '&quot;') + '" class="project-card-link">' +
      '<i class="fa-solid fa-book-open"></i> ' + openPost + '</a>' +
      '</div>'
    );
    descCards.push('<p class="projects-desc-text"></p>'); // empty right column for last card

    return { imageCards: imageCards, descCards: descCards };
  }

  var state = {
    projects: [],
    currentProjectIndex: 0,
    currentCardIndex: 0,
    cardCount: 0,
    autoTimer: null
  };

  var imageTrack = document.getElementById('projectsImageTrack');
  var descTrack = document.getElementById('projectsDescTrack');
  var imageDots = document.getElementById('projectsImageDots');
  var strip = document.getElementById('projectsStrip');
  var navLeft = document.getElementById('projectsNavLeft');
  var navRight = document.getElementById('projectsNavRight');

  if (!imageTrack || !descTrack) return;

  function renderProjectButtons() {
    if (!strip) return;
    var list = state.projects;
    strip.innerHTML = list.map(function(p, i) {
      var active = i === state.currentProjectIndex ? ' is-active' : '';
      return '<button type="button" class="projects-strip-btn' + active + '" data-index="' + i + '">' +
        (p.title || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</button>';
    }).join('');
  }

  function goToCard(index) {
    if (state.cardCount <= 0) return;
    state.currentCardIndex = (index + state.cardCount) % state.cardCount;
    var tx = -state.currentCardIndex * 100;
    imageTrack.style.transform = 'translateX(' + tx + '%)';
    descTrack.style.transform = 'translateX(' + tx + '%)';
    var dots = document.querySelectorAll('.projects-image-dot');
    for (var i = 0; i < dots.length; i++) {
      dots[i].classList.toggle('is-active', i === state.currentCardIndex);
      dots[i].setAttribute('aria-current', i === state.currentCardIndex ? 'true' : 'false');
    }
  }

  function startAuto() {
    if (state.autoTimer) clearInterval(state.autoTimer);
    state.autoTimer = null;
    if (state.cardCount > 1) {
      state.autoTimer = setInterval(function() {
        goToCard(state.currentCardIndex + 1);
      }, INTERVAL_MS);
    }
  }
  function stopAuto() {
    if (state.autoTimer) clearInterval(state.autoTimer);
    state.autoTimer = null;
  }

  function setProject(index) {
    var list = state.projects;
    if (!list.length) return;
    state.currentProjectIndex = (index + list.length) % list.length;
    var project = list[state.currentProjectIndex];
    var cards = buildCards(project);
    state.cardCount = cards.imageCards.length;

    imageTrack.innerHTML = cards.imageCards.map(function(html, i) {
      var isLast = (i === cards.imageCards.length - 1);
      return '<div class="projects-image-slide' + (isLast ? ' projects-slide-last' : '') + '">' + html + '</div>';
    }).join('');
    descTrack.innerHTML = cards.descCards.map(function(html) {
      return '<div class="projects-desc-slide">' + (html ? html : '') + '</div>';
    }).join('');

    imageDots.innerHTML = '';
    for (var i = 0; i < state.cardCount; i++) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'projects-image-dot' + (i === 0 ? ' is-active' : '');
      btn.setAttribute('data-index', String(i));
      btn.setAttribute('aria-label', 'Slide ' + (i + 1));
      btn.setAttribute('aria-current', i === 0 ? 'true' : 'false');
      imageDots.appendChild(btn);
    }

    state.currentCardIndex = 0;
    goToCard(0);
    startAuto();
    renderProjectButtons();

    imageDots.querySelectorAll('.projects-image-dot').forEach(function(btn, i) {
      btn.addEventListener('click', function() {
        goToCard(i);
        startAuto();
      });
    });
  }

  function init() {
    state.projects = getData();
    if (!state.projects.length) {
      var strings = getStrings();
      var empty = (strings['projects_page.empty'] != null ? strings['projects_page.empty'] : 'No projects yet.');
      imageTrack.innerHTML = '<div class="projects-desc-slide"><p class="projects-desc-text">' + empty + '</p></div>';
      descTrack.innerHTML = '<div class="projects-desc-slide"></div>';
      imageDots.innerHTML = '';
      if (strip) strip.innerHTML = '';
      return;
    }
    setProject(0);
  }

  if (strip) {
    strip.addEventListener('click', function(e) {
      var btn = e.target.closest('.projects-strip-btn');
      if (!btn) return;
      var idx = parseInt(btn.getAttribute('data-index'), 10);
      if (!isNaN(idx)) setProject(idx);
    });
  }

  var carouselWrap = document.getElementById('projectsImageCarousel');
  if (carouselWrap) {
    carouselWrap.addEventListener('mouseenter', stopAuto);
    carouselWrap.addEventListener('mouseleave', startAuto);
  }

  if (navLeft) {
    navLeft.addEventListener('click', function() {
      var list = state.projects;
      if (!list.length) return;
      var wrap = document.querySelector('.projects-strip-wrap');
      if (wrap) wrap.scrollBy({ left: -wrap.clientWidth, behavior: 'smooth' });
    });
  }
  if (navRight) {
    navRight.addEventListener('click', function() {
      var wrap = document.querySelector('.projects-strip-wrap');
      if (wrap) wrap.scrollBy({ left: wrap.clientWidth, behavior: 'smooth' });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  document.addEventListener('lang-applied', function(e) {
    state.projects = getData();
    if (state.projects.length) setProject(state.currentProjectIndex);
    else init();
  });
})();
</script>

  <script>
    function updateCartCount() {
      if (typeof Snipcart === 'undefined') return;
      var c = Snipcart.store.getState().cart.items.count;
      var el = document.querySelector('.snipcart-items-count');
      if (el) { el.textContent = c; el.style.display = c > 0 ? 'flex' : 'none'; }
    }
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof Snipcart !== 'undefined') Snipcart.store.subscribe(updateCartCount);

  <script>
    (function() {
      var header = document.querySelector('header.site-header');
      if (!header) return;

      var toggle = header.querySelector('.nav-toggle');
      var nav = header.querySelector('#site-nav');
      var backdrop = header.querySelector('.nav-backdrop');
      if (!toggle || !nav) return;

      function updateHeaderHeightVar() {
        // Use sticky header height (includes padding); drawer starts below it
        var h = header.offsetHeight || 0;
        document.documentElement.style.setProperty('--site-header-height', h + 'px');
      }

      updateHeaderHeightVar();

      function lockScroll() {
        var scrollY = window.scrollY || document.documentElement.scrollTop || 0;
        document.body.dataset.navScrollY = String(scrollY);
        document.body.classList.add('nav-locked');
        document.body.style.position = 'fixed';
        document.body.style.top = '-' + scrollY + 'px';
        document.body.style.left = '0';
        document.body.style.right = '0';
        document.body.style.width = '100%';
      }

      function unlockScroll() {
        var raw = document.body.dataset.navScrollY || '0';
        var scrollY = parseInt(raw, 10) || 0;
        document.body.classList.remove('nav-locked');
        document.body.style.position = '';
        document.body.style.top = '';
        document.body.style.left = '';
        document.body.style.right = '';
        document.body.style.width = '';
        delete document.body.dataset.navScrollY;
        window.scrollTo(0, scrollY);
      }

      function setOpen(open) {
        var isOpen = header.classList.contains('nav-open');
        if (open === isOpen) return;
        header.classList.toggle('nav-open', open);
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (open) lockScroll();
        else unlockScroll();
      }

      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        setOpen(!header.classList.contains('nav-open'));
      });

      nav.addEventListener('click', function(e) {
        var link = e.target && e.target.closest ? e.target.closest('a') : null;
        if (link) setOpen(false);
      });

      document.addEventListener('click', function(e) {
        if (header.classList.contains('nav-open') && !header.contains(e.target)) setOpen(false);
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && header.classList.contains('nav-open')) setOpen(false);
      });

      window.addEventListener('resize', function() {
        updateHeaderHeightVar();
        if (window.innerWidth > 768 && header.classList.contains('nav-open')) setOpen(false);
      });

      if (backdrop) {
        backdrop.addEventListener('click', function() {
          if (header.classList.contains('nav-open')) setOpen(false);
        });
      }
    })();
  </script>
